name: Parallax
options:
  bundleIdPrefix: com.parallax
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

targets:
  Parallax:
    type: application
    platform: macOS
    sources:
      - path: Parallax/Sources
      - path: Parallax/Resources
    info:
      path: Parallax/Info.plist
    entitlements:
      path: Parallax/Parallax.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parallax.app
        PRODUCT_NAME: Parallax
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: false
        INFOPLIST_KEY_LSUIElement: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
